<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestry</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            display: flex; height: 100vh;
            align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .wrapper { max-width: 500px; width: 90%; padding: 40px; animation: fadeIn 1.2s ease-out; }
        .brand { font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
        .intro { font-size: 24px; font-weight: 400; line-height: 1.6; margin-bottom: 40px; word-break: keep-all; }
        .intro span { color: var(--text-sub); }

        .char {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            white-space: pre; /* 공백 유지 핵심 */
            pointer-events: none;
        }

        .contact-link {
            font-size: 15px; color: var(--text-main);
            text-decoration: none; border-bottom: 1px solid #d2d2d7;
            padding-bottom: 4px; transition: all 0.3s ease;
        }
        .contact-link:hover { color: var(--text-sub); border-bottom-color: var(--text-sub); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand scatter">Nestry</div>
        <div class="intro scatter">
            <strong>Nest</strong>의 작업 공간입니다.<br>
            <span>작고 유용한 도구와 게임을 고민하며,<br>
            차분히 프로젝트를 준비하고 있습니다.</span>
        </div>
        <a href="mailto:admin@nestry.co.kr" class="contact-link">admin@nestry.co.kr</a>
    </div>

<script>
    const allChars = [];

    // [개선된 로직] 원본 구조를 파괴하지 않고 글자만 추출하여 치환
    function processElement(el) {
        const originalHTML = el.innerHTML;
        el.innerHTML = ''; // 한 번만 비움

        // 임시 컨테이너를 만들어 구조 분석
        const temp = document.createElement('div');
        temp.innerHTML = originalHTML;

        function traverse(node, target) {
            Array.from(node.childNodes).forEach(child => {
                if (child.nodeType === 3) { // 텍스트 노드
                    // 소스코드상의 줄바꿈/들여쓰기 공백 제거 (단어 사이 공백은 보존)
                    const text = child.textContent.replace(/\n\s+/g, "");
                    if (text.trim() === "" && child.textContent.includes('\n')) return;

                    [...text].forEach(char => {
                        const span = document.createElement('span');
                        span.innerText = char;
                        span.classList.add('char');
                        target.appendChild(span);
                        allChars.push(span);
                    });
                } else if (child.nodeName === 'BR') {
                    target.appendChild(document.createElement('br'));
                } else {
                    // strong, span 등 태그 복제
                    const clone = child.cloneNode(false);
                    target.appendChild(clone);
                    traverse(child, clone); // 재귀 호출 (비우지 않고 추가만 함)
                }
            });
        }

        traverse(temp, el);
    }

    // 초기화 실행
    document.querySelectorAll('.scatter').forEach(processElement);

    // 마우스 인터랙션
    window.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const radius = 100;

        allChars.forEach(char => {
            const rect = char.getBoundingClientRect();
            const charX = rect.left + rect.width / 2;
            const charY = rect.top + rect.height / 2;
            const dx = mouseX - charX;
            const dy = mouseY - charY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < radius) {
                const force = (radius - distance) / radius;
                const moveX = (dx / distance) * force * 20 * -1;
                const moveY = (dy / distance) * force * 20 * -1;
                char.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                char.style.transform = `translate(0, 0)`;
            }
        });
    });
</script>
</body>
</html>
