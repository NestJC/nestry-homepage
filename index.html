<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestry</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            display: flex; height: 100vh;
            align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .wrapper {
            max-width: 600px; width: 90%;
            padding: 40px; text-align: left;
        }

        .brand {
            font-size: 14px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 24px;
        }

        .intro {
            font-size: 32px; font-weight: 700;
            line-height: 1.4; margin-bottom: 40px;
            word-break: keep-all;
        }

        /* 개별 글자 스타일 */
        .char {
            display: inline-block; /* 위치 이동을 위해 필수 */
            transition: transform 0.1s ease-out; /* 부드러운 복귀 */
            white-space: pre; /* 공백 유지 */
            will-change: transform;
        }

        .contact-link {
            font-size: 15px; color: var(--text-main);
            text-decoration: none; border-bottom: 1px solid #d2d2d7;
            padding-bottom: 4px; transition: all 0.3s ease;
        }

        .contact-link:hover { color: var(--text-sub); border-bottom-color: var(--text-sub); }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand scatter">Nestry</div>
        
        <div class="intro scatter">
            Nest의 작업 공간입니다.<br>
            차분히 프로젝트를 준비하고 있습니다.
        </div>

        <a href="mailto:nest@nestry.co.kr" class="contact-link">nest@nestry.co.kr</a>
    </div>

<script>
    const scatterElements = document.querySelectorAll('.scatter');
    const chars = [];

    // 1. 텍스트를 한 글자씩 쪼개기
    scatterElements.forEach(el => {
        const text = el.innerText;
        el.innerHTML = '';
        [...text].forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            span.classList.add('char');
            el.appendChild(span);
            chars.push(span);
        });
    });

    // 2. 마우스 위치 추적 및 글자 이동
    window.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        chars.forEach(char => {
            const rect = char.getBoundingClientRect();
            const charX = rect.left + rect.width / 2;
            const charY = rect.top + rect.height / 2;

            const dx = mouseX - charX;
            const dy = mouseY - charY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            const radius = 100; // 영향 반경
            if (distance < radius) {
                const force = (radius - distance) / radius;
                const moveX = (dx / distance) * force * 20 * -1; // 마우스 반대 방향으로 이동
                const moveY = (dy / distance) * force * 20 * -1;
                char.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                char.style.transform = `translate(0, 0)`;
            }
        });
    });

    // 모바일 터치 대응 (선택 사항)
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent("mousemove", {
            clientX: touch.clientX,
            clientY: touch.clientY
        });
        window.dispatchEvent(mouseEvent);
    }, { passive: false });
</script>

</body>
</html>
