<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestry</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            /* 폰트 적용 순서 조정 */
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            display: flex; height: 100vh;
            align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .wrapper { max-width: 500px; width: 90%; padding: 40px; animation: fadeIn 1.2s ease-out; }

        .brand { font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
        .intro { font-size: 24px; font-weight: 400; line-height: 1.6; margin-bottom: 40px; word-break: keep-all; }
        .intro span { color: var(--text-sub); }

        .char {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            white-space: pre;
            pointer-events: none;
        }

        .contact-link {
            font-size: 15px; color: var(--text-main);
            text-decoration: none; border-bottom: 1px solid #d2d2d7;
            padding-bottom: 4px; transition: all 0.3s ease;
        }
        .contact-link:hover { color: var(--text-sub); border-bottom-color: var(--text-sub); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand scatter">Nestry</div>
        <div class="intro scatter">
            <strong>Nest</strong>의 작업 공간입니다.<br>
            <span>작고 유용한 도구와 게임을 고민하며,<br>
            차분히 프로젝트를 준비하고 있습니다.</span>
        </div>
        <a href="mailto:admin@nestry.co.kr" class="contact-link">admin@nestry.co.kr</a>
    </div>

<script>
    const scatterElements = document.querySelectorAll('.scatter');
    const allChars = [];

    // [버그 수정] 태그 내부 텍스트까지 완벽하게 쪼개는 개선된 함수
function injectSpans(element) {
    const nodes = Array.from(element.childNodes);
    element.innerHTML = ''; 

    nodes.forEach(node => {
        if (node.nodeType === 3) { // 텍스트 노드
            // 정규표현식을 사용하여 문장 앞뒤의 모든 줄바꿈과 연속된 공백을 정리합니다.
            const text = node.textContent.replace(/^\s+|\s+$/g, ''); 
            
            // 만약 공백을 지웠더니 내용이 없다면 추가하지 않고 건너뜁니다.
            if (text.length === 0) return;

            [...text].forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.classList.add('char');
                element.appendChild(span);
                allChars.push(span);
            });
        } else if (node.nodeName === 'BR') {
            element.appendChild(document.createElement('br'));
        } else { // strong, span 등 하위 태그 처리
            const clone = node.cloneNode(false); 
            element.appendChild(clone);
            // 자식 노드들을 다시 검사하여 공백을 지우고 삽입합니다.
            const children = Array.from(node.childNodes);
            children.forEach(child => {
                if (child.nodeType === 3) {
                    const cleanText = child.textContent.replace(/^\s+|\s+$/g, '');
                    [...cleanText].forEach(char => {
                        const span = document.createElement('span');
                        span.innerText = char;
                        span.classList.add('char');
                        clone.appendChild(span);
                        allChars.push(span);
                    });
                } else {
                    // 더 깊은 단계의 태그가 있다면 동일하게 처리
                    injectSpans(clone); 
                }
            });
        }
    });
}

    scatterElements.forEach(el => injectSpans(el));

    window.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const radius = 90;

        allChars.forEach(char => {
            const rect = char.getBoundingClientRect();
            const charX = rect.left + rect.width / 2;
            const charY = rect.top + rect.height / 2;
            const dx = mouseX - charX;
            const dy = mouseY - charY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < radius) {
                const force = (radius - distance) / radius;
                const moveX = (dx / distance) * force * 18 * -1;
                const moveY = (dy / distance) * force * 18 * -1;
                char.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                char.style.transform = `translate(0, 0)`;
            }
        });
    });
</script>
</body>
</html>
