<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestry</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            display: flex; height: 100vh;
            align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .wrapper {
            max-width: 600px; width: 90%;
            padding: 40px; position: relative;
            z-index: 2;
        }

        /* 캔버스를 텍스트 위치에 정확히 겹치게 설정 */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            pointer-events: none; /* 마우스 이벤트는 감지만 하고 클릭은 통과 */
        }

        /* 실제 텍스트는 입자가 보일 때까지 투명하게 유지 */
        .interactive-text {
            opacity: 0; /* 입자로 대체되므로 실제 글씨는 숨김 */
            user-select: none;
        }

        .brand {
            font-size: 14px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 24px;
        }

        .intro {
            font-size: 24px; font-weight: 400;
            line-height: 1.6; margin-bottom: 40px;
            word-break: keep-all;
        }

        .contact-link {
            font-size: 15px; color: var(--text-main);
            text-decoration: none; border-bottom: 1px solid #d2d2d7;
            padding-bottom: 4px; transition: all 0.3s ease;
            position: relative; z-index: 10; /* 링크는 클릭 가능해야 함 */
        }

        .contact-link:hover {
            color: var(--text-sub); border-bottom-color: var(--text-sub);
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="wrapper" id="ui-wrapper">
        <div class="brand interactive-text">Nestry</div>
        
        <div class="intro interactive-text">
            <strong>Nest</strong>의 작업 공간입니다.<br>
            작고 유용한 도구와 게임을 고민하며,<br>
            차분히 프로젝트를 준비하고 있습니다.
        </div>

        <a href="mailto:admin@nestry.co.kr" class="contact-link">admin@nestry.co.kr</a>
    </div>

<script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('ui-wrapper');
    const textElements = document.querySelectorAll('.interactive-text');

    let particles = [];
    const mouse = { x: null, y: null, radius: 80 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
    });

    class Particle {
        constructor(x, y, color) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.baseX = x;
            this.baseY = y;
            this.color = color;
            this.size = 1.5;
            this.density = (Math.random() * 30) + 10;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
                let force = (mouse.radius - distance) / mouse.radius;
                let directionX = (dx / distance) * force * this.density;
                let directionY = (dy / distance) * force * this.density;
                this.x -= directionX;
                this.y -= directionY;
            } else {
                this.x += (this.baseX - this.x) * 0.1;
                this.y += (this.baseY - this.y) * 0.1;
            }
        }
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];

        textElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            const style = window.getComputedStyle(el);
            
            // 임시 캔버스에 텍스트 그려서 픽셀 추출
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = rect.width;
            tempCanvas.height = rect.height;
            
            tempCtx.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
            tempCtx.fillStyle = 'black';
            tempCtx.textBaseline = 'top';
            
            // 줄바꿈 처리
            const lines = el.innerHTML.split('<br>');
            lines.forEach((line, i) => {
                const cleanText = line.replace(/<[^>]*>/g, "").trim();
                tempCtx.fillText(cleanText, 0, i * parseInt(style.lineHeight));
            });

            const pixelData = tempCtx.getImageData(0, 0, rect.width, rect.height).data;
            
            for (let y = 0; y < rect.height; y += 3) {
                for (let x = 0; x < rect.width; x += 3) {
                    if (pixelData[(y * rect.width + x) * 4 + 3] > 128) {
                        particles.push(new Particle(rect.left + x, rect.top + y, '#1d1d1f'));
                    }
                }
            }
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    // 폰트 로드 대기 후 실행
    document.fonts.ready.then(() => {
        init();
        animate();
    });

    window.addEventListener('resize', init);
</script>

</body>
</html>
