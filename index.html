<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestry</title>
    <style>
        /* 1. 기본 스타일 설정 */
        :root {
            --bg-color: #ffffff; /* 깔끔한 흰색 배경 */
            --text-main: #1d1d1f; /* 깊은 먹색 */
            --text-sub: #86868b; /* 차분한 회색 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 500px;
            width: 90%;
            padding: 40px;
        }

        /* 2. 타이포그래피 */
        .brand {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .intro {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 40px;
            word-break: keep-all; /* 한글 단어 잘림 방지 */
        }

        .intro span {
            color: var(--text-sub);
        }

        /* 3. 연락처 및 링크 */
        .contact-link {
            font-size: 15px;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid #d2d2d7;
            padding-bottom: 4px;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            color: var(--text-sub);
            border-bottom-color: var(--text-sub);
        }

        /* 미세한 애니메이션: 페이지 로드 시 스르륵 나타남 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wrapper {
            animation: fadeIn 1.2s ease-out;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand">Nestry</div>
        
        <div class="intro">
            <strong>Nest</strong>의 작업 공간입니다.<br>
            <span>작고 유용한 도구와 게임을 고민하며,<br>
            차분히 프로젝트를 준비하고 있습니다.</span>
        </div>

        <a href="mailto:admin@nestry.co.kr" class="contact-link">admin@nestry.co.kr</a>
    </div>

</body>
</html>
